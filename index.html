<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EXP Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
header{background:linear-gradient(135deg,#161b22,#21262d);padding:16px 24px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:1.4rem;font-weight:700;color:#58a6ff}
.meta-info{font-size:.78rem;color:#8b949e}
.meta-info span{color:#e3b341;font-weight:600}
.controls{background:#161b22;padding:12px 24px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:7px}
.ctrl-group label{font-size:.8rem;color:#8b949e;white-space:nowrap}
.ctrl-group input[type=number],.ctrl-group select{background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:4px 9px;font-size:.83rem;width:80px}
.ctrl-group select{width:auto;max-width:180px}
.ctrl-group input[type=checkbox]{accent-color:#58a6ff;width:15px;height:15px}
.btn{border:none;border-radius:6px;padding:6px 16px;font-size:.83rem;cursor:pointer;font-weight:600;transition:background .2s}
.btn-refresh{background:#1f6feb;color:#fff}.btn-refresh:hover{background:#388bfd}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;padding:0 24px}
.tab{padding:10px 20px;cursor:pointer;font-size:.88rem;color:#8b949e;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab:hover:not(.active){color:#e6edf3}
.tab-content{display:none;padding:18px 24px}.tab-content.active{display:block}
.filter-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.filter-row label{font-size:.8rem;color:#8b949e}
.filter-row select,.filter-row input[type=text]{background:#161b22;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:5px 9px;font-size:.82rem}
.summary-cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 18px;min-width:120px;text-align:center}
.card-val{font-size:1.4rem;font-weight:700}
.card-lbl{font-size:.73rem;color:#8b949e;margin-top:3px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:#161b22;color:#8b949e;font-weight:600;padding:9px 11px;text-align:left;border-bottom:2px solid #30363d;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
thead th:hover{color:#e6edf3}
thead th.asc::after{content:' ▲';color:#58a6ff}
thead th.desc::after{content:' ▼';color:#58a6ff}
tbody tr{border-bottom:1px solid #21262d;transition:background .12s}
tbody tr:hover{background:#161b22}
tbody td{padding:8px 11px;vertical-align:middle}
.chip{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.76rem;font-weight:700}
.bright-green{background:#1a4731;color:#3fb950;border:1px solid #238636}
.faded-green{background:#1a3a27;color:#56d364;border:1px solid #1a4731}
.bright-red{background:#4b1113;color:#f85149;border:1px solid #da3633}
.faded-red{background:#3d1012;color:#ff7b72;border:1px solid #da3633}
.gray{background:#21262d;color:#8b949e;border:1px solid #30363d}
.bar-wrap{display:flex;align-items:center;gap:8px}
.mini-bar{height:16px;border-radius:3px;min-width:2px}
.rs-track{display:inline-block;width:72px;height:7px;background:#21262d;border-radius:4px;overflow:hidden;vertical-align:middle}
.rs-fill{height:100%;border-radius:4px}
.pos{color:#3fb950}.neg{color:#f85149}.neu{color:#8b949e}
.sector-tag{background:#1b2b47;color:#79c0ff;border:1px solid #1f6feb;border-radius:9px;padding:1px 7px;font-size:.71rem}
.empty{text-align:center;padding:60px;color:#8b949e}
.loading{text-align:center;padding:40px;color:#8b949e;font-size:.9rem}
.err{color:#f85149;padding:20px;text-align:center}
.tbl-wrap{overflow-x:auto;max-height:72vh;overflow-y:auto}
</style>
</head>
<body>

<header>
  <div>
    <h1>&#9660; EXP Scanner</h1>
    <div class="meta-info">Exponential Regression Slope &times; R&sup2; &mdash; India Markets</div>
  </div>
  <div class="meta-info" id="meta-box">No data loaded yet.</div>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>R&sup2; Min:</label>
    <input type="number" id="r2min" value="0" min="0" max="1" step="0.05" style="width:65px" oninput="applyFilters()"/>
  </div>
  <div class="ctrl-group">
    <label>Signal:</label>
    <select id="sigFilter" onchange="applyFilters()">
      <option value="">All</option>
      <option value="bright_green">Strong Up</option>
      <option value="faded_green">Weak Up</option>
      <option value="bright_red">Strong Down</option>
      <option value="faded_red">Weak Down</option>
      <option value="gray">No Trend</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Search:</label>
    <input type="text" id="globalSearch" placeholder="Name / symbol..." style="width:150px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:4px 9px;font-size:.83rem" oninput="applyFilters()"/>
  </div>
  <button class="btn btn-refresh" onclick="loadData()">&#8635; Refresh Data</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('indices')">&#128200; Indices (<span id="idx-count">—</span>)</div>
  <div class="tab" onclick="switchTab('stocks')">&#128217; Stocks (<span id="stk-count">—</span>)</div>
</div>

<!-- INDICES -->
<div class="tab-content active" id="tab-indices">
  <div class="summary-cards" id="idx-cards"></div>
  <div class="tbl-wrap" id="idx-wrap"><div class="loading">Loading data...</div></div>
</div>

<!-- STOCKS -->
<div class="tab-content" id="tab-stocks">
  <div class="filter-row">
    <label>Sector:</label>
    <select id="sectorFilter" onchange="applyFilters()"><option value="">All Sectors</option></select>
    <label>Sort:</label>
    <select id="stkSort" onchange="applyFilters()">
      <option value="slope">EXP Slope</option>
      <option value="r2">R&sup2;</option>
      <option value="high52pct">52W High %</option>
      <option value="beta">Beta</option>
      <option value="name">Name A-Z</option>
    </select>
    <label>Order:</label>
    <select id="stkOrder" onchange="applyFilters()">
      <option value="desc">Desc</option>
      <option value="asc">Asc</option>
    </select>
  </div>
  <div class="summary-cards" id="stk-cards"></div>
  <div class="tbl-wrap" id="stk-wrap"><div class="loading">Loading data...</div></div>
</div>

<script>
let RAW = null;

// ── LOAD JSON ──────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('idx-wrap').innerHTML = '<div class="loading">Fetching results.json...</div>';
  document.getElementById('stk-wrap').innerHTML = '<div class="loading">Fetching results.json...</div>';
  try {
    const base = 'https://raw.githubusercontent.com/VJTriumph/EXP-Scanner/main/data/results.json';
    const r = await fetch(base + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status + ' — results.json not found. Run the scanner first via GitHub Actions.');
    RAW = await r.json();
    onDataLoaded();
  } catch(e) {
    const msg = '<div class="err">&#9888; ' + e.message + '</div>';
    document.getElementById('idx-wrap').innerHTML = msg;
    document.getElementById('stk-wrap').innerHTML = msg;
  }
}

function onDataLoaded() {
  const m = RAW.meta;
  document.getElementById('meta-box').innerHTML =
    'Updated: <span>' + m.generated_at + '</span> &nbsp;|&nbsp; Period: <span>' + m.length + '</span> bars &nbsp;|&nbsp; Beta window: <span>' + m.beta_window + '</span> &nbsp;|&nbsp; Annualized: <span>' + (m.with_annualize?'Yes':'No') + '</span> &nbsp;|&nbsp; &times;R&sup2;: <span>' + (m.with_rsquared?'Yes':'No') + '</span>';
  // populate sector filter
  const sectors = [...new Set(RAW.stocks.map(s=>s.industry).filter(Boolean))].sort();
  const sel = document.getElementById('sectorFilter');
  sel.innerHTML = '<option value="">All Sectors</option>' + sectors.map(s=>`<option>${s}</option>`).join('');
  applyFilters();
}

// ── FILTERS & RENDER ────────────────────────────────────────────────────────
function applyFilters() {
  if (!RAW) return;
  const r2min  = parseFloat(document.getElementById('r2min').value) || 0;
  const sig    = document.getElementById('sigFilter').value;
  const search = document.getElementById('globalSearch').value.toLowerCase();
  const sector = document.getElementById('sectorFilter').value;
  const sort   = document.getElementById('stkSort').value;
  const order  = document.getElementById('stkOrder').value;

  // ── Indices
  let idx = RAW.indices.filter(r => {
    if (r2min > 0 && (!r.slope_data || r.slope_data.r2 < r2min)) return false;
    if (sig && r.signal_color !== sig) return false;
    if (search && !r.name.toLowerCase().includes(search) && !r.symbol.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b) => (b.slope_data?.slope??-Infinity) - (a.slope_data?.slope??-Infinity));
  document.getElementById('idx-count').textContent = idx.length;
  renderSummary('idx-cards', idx);
  renderIndices(idx);

  // ── Stocks
  let stk = RAW.stocks.filter(r => {
    if (sector && r.industry !== sector) return false;
    if (r2min > 0 && (!r.slope_data || r.slope_data.r2 < r2min)) return false;
    if (sig && r.signal_color !== sig) return false;
    if (search && !r.name.toLowerCase().includes(search) && !r.symbol.toLowerCase().includes(search)) return false;
    return true;
  });
  stk.sort((a,b) => {
    if (sort==='slope')    return order==='desc' ? (b.slope_data?.slope??-Infinity)-(a.slope_data?.slope??-Infinity) : (a.slope_data?.slope??-Infinity)-(b.slope_data?.slope??-Infinity);
    if (sort==='r2')       return order==='desc' ? (b.slope_data?.r2??0)-(a.slope_data?.r2??0) : (a.slope_data?.r2??0)-(b.slope_data?.r2??0);
    if (sort==='high52pct')return order==='desc' ? (b.high52_data?.pct_from_high??-Infinity)-(a.high52_data?.pct_from_high??-Infinity) : (a.high52_data?.pct_from_high??-Infinity)-(b.high52_data?.pct_from_high??-Infinity);
    if (sort==='beta')     return order==='desc' ? (b.beta??0)-(a.beta??0) : (a.beta??0)-(b.beta??0);
    return order==='desc' ? b.name.localeCompare(a.name) : a.name.localeCompare(b.name);
  });
  document.getElementById('stk-count').textContent = stk.length;
  renderSummary('stk-cards', stk);
  renderStocks(stk);
}

// ── COLOR HELPERS ──────────────────────────────────────────────────────────
function chipHtml(signal, val) {
  const cls = {bright_green:'bright-green',faded_green:'faded-green',bright_red:'bright-red',faded_red:'faded-red',gray:'gray'}[signal] || 'gray';
  return `<span class="chip ${cls}">${val !== null && val !== undefined ? val+'%' : 'N/A'}</span>`;
}
function barColor(signal) {
  return {bright_green:'#3fb950',faded_green:'#56d364',bright_red:'#f85149',faded_red:'#ff7b72',gray:'#484f58'}[signal]||'#484f58';
}

// ── SUMMARY CARDS ──────────────────────────────────────────────────────────
function renderSummary(id, rows) {
  const valid = rows.filter(r=>r.slope_data);
  const pos = valid.filter(r=>r.slope_data.slope>0).length;
  const neg = valid.filter(r=>r.slope_data.slope<0).length;
  const avgS = valid.length ? (valid.reduce((s,r)=>s+r.slope_data.slope,0)/valid.length).toFixed(1) : 'N/A';
  const avgR = valid.length ? ((valid.reduce((s,r)=>s+r.slope_data.r2,0)/valid.length)*100).toFixed(1) : 'N/A';
  document.getElementById(id).innerHTML = `
    <div class="card"><div class="card-val pos">${pos}</div><div class="card-lbl">Positive</div></div>
    <div class="card"><div class="card-val neg">${neg}</div><div class="card-lbl">Negative</div></div>
    <div class="card"><div class="card-val" style="color:#58a6ff">${avgS !== 'N/A' ? avgS+'%' : 'N/A'}</div><div class="card-lbl">Avg Slope</div></div>
    <div class="card"><div class="card-val" style="color:#e3b341">${avgR !== 'N/A' ? avgR+'%' : 'N/A'}</div><div class="card-lbl">Avg R&sup2;</div></div>
    <div class="card"><div class="card-val neu">${rows.length}</div><div class="card-lbl">Shown</div></div>
  `;
}

// ── INDICES TABLE ──────────────────────────────────────────────────────────
function renderIndices(data) {
  if (!data.length) { document.getElementById('idx-wrap').innerHTML='<div class="empty">No indices match the filter.</div>'; return; }
  const rows = data.map(r => {
    const sd = r.slope_data;
    const h  = r.high52_data;
    const bc = barColor(r.signal_color);
    const slope = sd ? sd.slope.toFixed(2) : null;
    const r2val = sd ? (sd.r2*100).toFixed(1) : null;
    const rsFill= sd ? sd.r2*100 : 0;
    const cur   = h ? h.current.toLocaleString('en-IN',{maximumFractionDigits:2}) : 'N/A';
    const hi52  = h ? h.high52.toLocaleString('en-IN',{maximumFractionDigits:2}) : 'N/A';
    const pct   = h ? h.pct_from_high.toFixed(2) : null;
    const pctCls= h && h.pct_from_high < 0 ? 'neg' : 'pos';
    const beta  = r.beta != null ? r.beta.toFixed(2) : 'N/A';
    const betaCls = r.beta == null ? 'neu' : r.beta < 0.8 ? 'pos' : r.beta > 1.5 ? 'neg' : 'neu';
    const bw    = sd ? Math.min(Math.abs(sd.slope)/1.5, 90) : 0;
    return `<tr>
      <td><b>${r.name}</b><br><span style="color:#8b949e;font-size:.71rem">${r.symbol}</span></td>
      <td><div class="bar-wrap"><div class="mini-bar" style="width:${bw}px;background:${bc}"></div>${chipHtml(r.signal_color, slope)}</div></td>
      <td><div class="rs-track"><div class="rs-fill" style="width:${rsFill}%;background:${bc}"></div></div> <span class="neu" style="font-size:.76rem">${r2val !== null ? r2val+'%' : 'N/A'}</span></td>
      <td class="neu">${cur}</td>
      <td class="neu">${hi52}</td>
      <td class="${pctCls}">${pct !== null ? pct+'%' : 'N/A'}</td>
      <td class="${betaCls}">${beta}</td>
    </tr>`;
  }).join('');
  document.getElementById('idx-wrap').innerHTML = `<table>
    <thead><tr>
      <th>Index</th><th>EXP Slope (Ann.%)</th><th>R&sup2;</th>
      <th>Current</th><th>52W High</th><th>% from 52W High</th><th>Beta vs Nifty50</th>
    </tr></thead><tbody>${rows}</tbody>
  </table>`;
}

// ── STOCKS TABLE ───────────────────────────────────────────────────────────
function renderStocks(data) {
  if (!data.length) { document.getElementById('stk-wrap').innerHTML='<div class="empty">No stocks match the filter.</div>'; return; }
  const rows = data.map(r => {
    const sd = r.slope_data;
    const h  = r.high52_data;
    const bc = barColor(r.signal_color);
    const slope = sd ? sd.slope.toFixed(2) : null;
    const r2val = sd ? (sd.r2*100).toFixed(1) : null;
    const rsFill= sd ? sd.r2*100 : 0;
    const cur   = h ? h.current.toLocaleString('en-IN',{maximumFractionDigits:2}) : 'N/A';
    const hi52  = h ? h.high52.toLocaleString('en-IN',{maximumFractionDigits:2}) : 'N/A';
    const pct   = h ? h.pct_from_high.toFixed(2) : null;
    const pctCls= h && h.pct_from_high < 0 ? 'neg' : 'pos';
    const beta  = r.beta != null ? r.beta.toFixed(2) : 'N/A';
    const betaCls = r.beta == null ? 'neu' : r.beta < 0.8 ? 'pos' : r.beta > 1.5 ? 'neg' : 'neu';
    const bw    = sd ? Math.min(Math.abs(sd.slope)/1.5, 90) : 0;
    return `<tr>
      <td><b>${r.name}</b><br><span style="color:#8b949e;font-size:.71rem">${r.symbol}</span></td>
      <td><span class="sector-tag">${r.industry||'—'}</span></td>
      <td><div class="bar-wrap"><div class="mini-bar" style="width:${bw}px;background:${bc}"></div>${chipHtml(r.signal_color, slope)}</div></td>
      <td><div class="rs-track"><div class="rs-fill" style="width:${rsFill}%;background:${bc}"></div></div> <span class="neu" style="font-size:.76rem">${r2val !== null ? r2val+'%' : 'N/A'}</span></td>
      <td class="neu">${cur}</td>
      <td class="neu">${hi52}</td>
      <td class="${pctCls}">${pct !== null ? pct+'%' : 'N/A'}</td>
      <td class="${betaCls}">${beta}</td>
    </tr>`;
  }).join('');
  document.getElementById('stk-wrap').innerHTML = `<table>
    <thead><tr>
      <th>Stock</th><th>Sector</th><th>EXP Slope (Ann.%)</th><th>R&sup2;</th>
      <th>Current</th><th>52W High</th><th>% from 52W High</th><th>Beta vs Nifty50</th>
    </tr></thead><tbody>${rows}</tbody>
  </table>`;
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='indices')||(i===1&&tab==='stocks')));
  document.getElementById('tab-indices').classList.toggle('active',tab==='indices');
  document.getElementById('tab-stocks').classList.toggle('active',tab==='stocks');
}

// ── BOOT ───────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
    </html>
